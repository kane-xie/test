<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>2048</title>
  <style>
    :root {
      --page: #f5f3ed;
      --ink: #2d2a26;
      --muted: #756f67;
      --panel: #fffaf0;
      --board: #9f9488;
      --gap: 8px;
      --cell: rgba(238, 228, 218, .45);
      --accent: #26736b;
      --accent-dark: #1d5b55;
      --danger: #9b3f34;
      --shadow: 0 18px 45px rgba(65, 54, 42, .16);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(38, 115, 107, .10), transparent 38%),
        linear-gradient(315deg, rgba(155, 63, 52, .10), transparent 34%),
        var(--page);
      touch-action: manipulation;
    }

    main {
      width: min(100%, 520px);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      position: relative;
      display: inline-block;
      margin: 0;
      font-size: clamp(52px, 16vw, 80px);
      line-height: .9;
      letter-spacing: 0;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    h1 .version {
      position: absolute;
      right: 2px;
      bottom: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      opacity: .72;
    }

    .scores {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .score-box {
      min-width: 82px;
      padding: 10px 12px;
      border-radius: 8px;
      color: #fffaf4;
      background: #4f463c;
      text-align: center;
      box-shadow: 0 8px 20px rgba(45, 42, 38, .14);
    }

    .score-box span {
      display: block;
      margin-bottom: 2px;
      color: rgba(255, 250, 244, .72);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .score-box strong {
      display: block;
      min-height: 28px;
      font-size: 24px;
      line-height: 1.15;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .buttons {
      display: flex;
      flex: 0 0 auto;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      color: white;
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, opacity .12s ease;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

      button.secondary {
        background: #6f6256;
      }

      button.secondary:hover {
        background: #5c5249;
      }

      button.armed {
        background: #9b3f34;
      }

      button:disabled {
        cursor: default;
        opacity: .5;
        transform: none;
    }

    .game-wrap {
      position: relative;
      padding: var(--gap);
      border-radius: 8px;
      background: var(--board);
      box-shadow: var(--shadow);
      touch-action: none;
      user-select: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
      aspect-ratio: 1 / 1;
    }

    .grid-cell {
      border-radius: 7px;
      background: var(--cell);
    }

    .tiles {
      position: absolute;
      inset: var(--gap);
      aspect-ratio: 1 / 1;
      gap: var(--gap);
      pointer-events: none;
    }

    .tile {
      display: grid;
      place-items: center;
      position: absolute;
      min-width: 0;
      width: var(--tile-size);
      height: var(--tile-size);
      border-radius: 7px;
      padding: 0 4px;
      color: var(--tile-color, #766d64);
      background: var(--tile-bg, #eee4da);
      font-size: 54px;
      font-weight: 560;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: none;
      cursor: default;
      transition: transform .28s cubic-bezier(.18, .72, .22, 1), opacity .22s ease;
      will-change: transform, opacity;
    }

    .tile.ghost {
      z-index: 3;
      opacity: .85;
    }

    .tile.spawned {
      animation: spawn .28s ease-out;
    }

    .tile[data-value="4"] { background: #ede0c8; }
    .tile[data-value="8"] { color: #fffaf4; background: #e49a52; }
    .tile[data-value="16"] { color: #fffaf4; background: #dc7346; }
    .tile[data-value="32"] { color: #fffaf4; background: #c95b48; }
    .tile[data-value="64"] { color: #fffaf4; background: var(--danger); }
    .tile[data-value="128"] { color: #fffaf4; background: #d6b354; }
    .tile[data-value="256"] { color: #fffaf4; background: #c99d3d; }
    .tile[data-value="512"] { color: #fffaf4; background: #b8892d; }
    .tile[data-value="1024"] { color: #fffaf4; background: #457a8b; }
    .tile[data-value="2048"] { color: #fffaf4; background: #26736b; }
    .tile.digits-3 { font-size: 46px; }
    .tile.digits-4 { font-size: 38px; }
    .tile.digits-5 { font-size: 31px; }
    .tile.digits-6 { font-size: 25px; }
    .tile.digits-7,
    .tile.digits-8 { font-size: 21px; }
    .tile.super { color: var(--tile-color, #fffaf4); }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      border-radius: 8px;
      background: rgba(255, 250, 240, .88);
      text-align: center;
    }

    .overlay.show {
      display: grid;
    }

    .toast {
      position: absolute;
      top: 18px;
      left: 50%;
      z-index: 2;
      max-width: calc(100% - 36px);
      transform: translateX(-50%);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fffaf4;
      background: rgba(38, 115, 107, .95);
      font-weight: 800;
      line-height: 1.3;
      text-align: center;
      box-shadow: 0 10px 26px rgba(45, 42, 38, .22);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 4px);
    }

    .message {
      max-width: 320px;
    }

    .message h2 {
      margin: 0 0 12px;
      font-size: 42px;
      letter-spacing: 0;
    }

    .message p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    @keyframes spawn {
      0% {
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 1;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
        align-items: start;
      }

      .topbar {
        grid-template-columns: 1fr;
        align-items: stretch;
        gap: 14px;
      }

      .scores {
        justify-content: stretch;
      }

      .score-box {
        flex: 1;
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }

      .tile { font-size: 42px; }
      .tile.digits-3 { font-size: 36px; }
      .tile.digits-4 { font-size: 30px; }
      .tile.digits-5 { font-size: 25px; }
      .tile.digits-6 { font-size: 20px; }
      .tile.digits-7,
      .tile.digits-8 { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="topbar" aria-label="游戏状态">
      <h1 id="title">2048<span class="version">v1.6</span></h1>
      <div class="scores">
        <div class="score-box">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-box">
          <span>Best</span>
          <strong id="best">0</strong>
        </div>
        <div class="score-box">
          <span>Max</span>
          <strong id="max-tile">0</strong>
        </div>
      </div>
    </section>

    <section class="actions">
      <div class="buttons">
        <button class="secondary" id="undo" type="button">撤销</button>
        <button id="new-game" type="button">新游戏</button>
      </div>
    </section>

    <section class="game-wrap" id="game" aria-label="2048 棋盘">
      <div class="grid" aria-hidden="true"></div>
      <div class="tiles" id="tiles"></div>
      <div class="toast" id="toast" role="status" aria-live="polite">达成 2048，可以继续玩</div>
      <div class="overlay" id="overlay">
        <div class="message">
          <h2 id="message-title">游戏结束</h2>
          <p id="message-copy">没有可移动的格子了。</p>
          <button id="overlay-action" type="button">再来一局</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const size = 4;
    const emptyBoard = () => Array.from({ length: size }, () => Array(size).fill(0));
    const titleEl = document.querySelector("#title");
    const scoreEl = document.querySelector("#score");
    const bestEl = document.querySelector("#best");
    const maxTileEl = document.querySelector("#max-tile");
    const tilesEl = document.querySelector("#tiles");
    const gridEl = document.querySelector(".grid");
    const toastEl = document.querySelector("#toast");
    const overlayEl = document.querySelector("#overlay");
    const messageTitleEl = document.querySelector("#message-title");
    const messageCopyEl = document.querySelector("#message-copy");
    const undoButton = document.querySelector("#undo");
    const newGameButton = document.querySelector("#new-game");
    const overlayAction = document.querySelector("#overlay-action");
    const gameEl = document.querySelector("#game");

    const bestKey = "codex-2048-best";
    const stateKey = "codex-2048-state";
    let board;
    let tileIds;
    let nextTileId = 1;
    let score;
    let best = Number(localStorage.getItem(bestKey) || 0);
    let previous = null;
    let won = false;
    let finished = false;
    let overlayOpen = false;
    let skipSpawnOnce = false;
    let spawnedCells = [];
    let toastTimer = null;

    for (let i = 0; i < size * size; i += 1) {
      const cell = document.createElement("div");
      cell.className = "grid-cell";
      gridEl.appendChild(cell);
    }

    function cloneBoard(source) {
      return source.map((row) => [...row]);
    }

    function emptyIdBoard() {
      return Array.from({ length: size }, () => Array(size).fill(null));
    }

    function cloneIdBoard(source) {
      return source.map((row) => [...row]);
    }

    function isValidBoard(value) {
      return Array.isArray(value)
        && value.length === size
        && value.every((row) => Array.isArray(row)
          && row.length === size
          && row.every((cell) => Number.isInteger(cell) && cell >= 0));
    }

    function isValidIdBoard(value) {
      return Array.isArray(value)
        && value.length === size
        && value.every((row) => Array.isArray(row)
          && row.length === size
          && row.every((cell) => cell === null || Number.isInteger(cell)));
    }

    function rebuildTileIds() {
      tileIds = emptyIdBoard();
      nextTileId = 1;
      board.forEach((row, r) => {
        row.forEach((value, c) => {
          if (!value) return;
          tileIds[r][c] = nextTileId;
          nextTileId += 1;
        });
      });
    }

    function saveState() {
      const state = {
        board,
        tileIds,
        nextTileId,
        score,
        best,
        previous,
        won,
        finished,
        overlayOpen,
        skipSpawnOnce
      };
      localStorage.setItem(stateKey, JSON.stringify(state));
    }

    function loadState() {
      try {
        const state = JSON.parse(localStorage.getItem(stateKey));
        if (!state || !isValidBoard(state.board)) return false;

        board = cloneBoard(state.board);
        if (isValidIdBoard(state.tileIds)) {
          tileIds = cloneIdBoard(state.tileIds);
          nextTileId = Number.isInteger(state.nextTileId) ? state.nextTileId : 1;
        } else {
          rebuildTileIds();
        }
        const maxTileId = Math.max(0, ...tileIds.flat().filter((id) => id !== null));
        if (nextTileId <= maxTileId) nextTileId = maxTileId + 1;
        score = Number.isFinite(state.score) ? state.score : 0;
        best = Number.isFinite(state.best) ? Math.max(best, state.best) : best;
        localStorage.setItem(bestKey, String(best));
        previous = state.previous && isValidBoard(state.previous.board)
          ? {
              board: cloneBoard(state.previous.board),
              tileIds: isValidIdBoard(state.previous.tileIds) ? cloneIdBoard(state.previous.tileIds) : null,
              nextTileId: Number.isInteger(state.previous.nextTileId) ? state.previous.nextTileId : nextTileId,
              score: Number.isFinite(state.previous.score) ? state.previous.score : 0,
              won: Boolean(state.previous.won),
              finished: Boolean(state.previous.finished),
              skipSpawnOnce: Boolean(state.previous.skipSpawnOnce)
            }
          : null;
        won = Boolean(state.won);
        finished = Boolean(state.finished);
        overlayOpen = Boolean(state.overlayOpen);
        skipSpawnOnce = Boolean(state.skipSpawnOnce);
        spawnedCells = [];
        return true;
      } catch {
        localStorage.removeItem(stateKey);
        return false;
      }
    }

    function randomEmptyCell() {
      const cells = [];
      board.forEach((row, r) => {
        row.forEach((value, c) => {
          if (!value) cells.push([r, c]);
        });
      });
      return cells[Math.floor(Math.random() * cells.length)];
    }

    function addRandomTile() {
      const cell = randomEmptyCell();
      if (!cell) return;
      const [r, c] = cell;
      board[r][c] = Math.random() < .9 ? 2 : 4;
      tileIds[r][c] = nextTileId;
      nextTileId += 1;
      spawnedCells.push(`${r}-${c}`);
    }

    function applyTilePresentation(tile, value) {
      const digits = Math.min(String(value).length, 8);
      tile.classList.add(`digits-${digits}`);

      if (value <= 2048) return;

      const highValuePalette = [
        "#215f6d",
        "#6a4c93",
        "#2f7d4f",
        "#a45a2a",
        "#8f3f5f",
        "#3d5a80",
        "#6d6a2f",
        "#5f4b32"
      ];
      const power = Math.round(Math.log2(value));
      tile.style.setProperty("--tile-bg", highValuePalette[power % highValuePalette.length]);
      tile.style.setProperty("--tile-color", "#fffaf4");
    }

    function setupGame() {
      board = emptyBoard();
      tileIds = emptyIdBoard();
      nextTileId = 1;
      score = 0;
      previous = null;
      won = false;
      finished = false;
      overlayOpen = false;
      skipSpawnOnce = false;
      spawnedCells = [];
      addRandomTile();
      addRandomTile();
      render();
      saveState();
    }

    function getTileLayout() {
      const gap = Number.parseFloat(getComputedStyle(tilesEl).gap) || 0;
      const width = tilesEl.clientWidth || gridEl.clientWidth;
      const cellSize = (width - gap * (size - 1)) / size;
      tilesEl.style.setProperty("--tile-size", `${cellSize}px`);
      return { gap, cellSize, step: cellSize + gap };
    }

    function tileTransform(row, col, layout) {
      return `translate(${col * layout.step}px, ${row * layout.step}px)`;
    }

    function getTilePositions() {
      const positions = new Map();
      tileIds.forEach((row, r) => {
        row.forEach((id, c) => {
          if (id !== null) positions.set(id, { row: r, col: c });
        });
      });
      return positions;
    }

    function createTile(value) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.textContent = value;
      tile.dataset.value = String(value);
      if (value > 2048) tile.classList.add("super");
      applyTilePresentation(tile, value);
      return tile;
    }

    function render(previousPositions = null, mergeGhosts = []) {
      const layout = getTileLayout();
      const movingTiles = [];
      tilesEl.replaceChildren();
      board.forEach((row, r) => {
        row.forEach((value, c) => {
          if (!value) return;
          const tile = createTile(value);
          const id = tileIds[r][c];
          const finalTransform = tileTransform(r, c, layout);
          tile.dataset.row = String(r);
          tile.dataset.col = String(c);
          tile.dataset.id = String(id);
          tilesEl.appendChild(tile);

          const previousPosition = previousPositions?.get(id);
          if (previousPosition && (previousPosition.row !== r || previousPosition.col !== c)) {
            tile.style.transform = tileTransform(previousPosition.row, previousPosition.col, layout);
            movingTiles.push({ tile, transform: finalTransform });
          } else {
            tile.style.transform = finalTransform;
            if (spawnedCells.includes(`${r}-${c}`)) tile.classList.add("spawned");
          }
        });
      });

      mergeGhosts.forEach((ghost) => {
        const tile = createTile(ghost.value);
        tile.classList.add("ghost");
        tile.style.transform = tileTransform(ghost.from.row, ghost.from.col, layout);
        tilesEl.appendChild(tile);
        movingTiles.push({
          tile,
          transform: tileTransform(ghost.to.row, ghost.to.col, layout),
          fade: true
        });
      });

      if (movingTiles.length) {
        requestAnimationFrame(() => {
          movingTiles.forEach(({ tile, transform, fade }) => {
            tile.style.transform = transform;
            if (fade) tile.style.opacity = "0";
          });
        });
      }

      scoreEl.textContent = score;
      bestEl.textContent = best;
      maxTileEl.textContent = Math.max(...board.flat());
      undoButton.disabled = !previous;

      if (overlayOpen) {
        overlayEl.classList.add("show");
      } else {
        overlayEl.classList.remove("show");
      }

      spawnedCells = [];
    }

    function getLineCells(direction, index) {
      const cells = [];
      for (let i = 0; i < size; i += 1) {
        const r = direction === "left" || direction === "right" ? index : i;
        const c = direction === "left" || direction === "right" ? i : index;
        cells.push(board[r][c] ? { value: board[r][c], id: tileIds[r][c] } : null);
      }

      return direction === "right" || direction === "down" ? cells.reverse() : cells;
    }

    function setLineCells(direction, index, cells) {
      const values = direction === "right" || direction === "down" ? [...cells].reverse() : cells;
      for (let i = 0; i < size; i += 1) {
        const cell = values[i];
        if (direction === "left" || direction === "right") {
          board[index][i] = cell?.value || 0;
          tileIds[index][i] = cell?.id ?? null;
        } else {
          board[i][index] = cell?.value || 0;
          tileIds[i][index] = cell?.id ?? null;
        }
      }
    }

    function slideAndMergeCells(line) {
      const values = line.filter(Boolean);
      const merged = [];
      const mergePairs = [];
      let gained = 0;

      for (let i = 0; i < values.length; i += 1) {
        if (values[i].value === values[i + 1]?.value) {
          const next = values[i].value * 2;
          merged.push({ value: next, id: values[i].id });
          mergePairs.push({
            survivorId: values[i].id,
            consumedId: values[i + 1].id,
            value: values[i + 1].value
          });
          gained += next;
          i += 1;
        } else {
          merged.push(values[i]);
        }
      }

      while (merged.length < size) merged.push(null);
      return { line: merged, gained, mergePairs };
    }

    function boardsEqual(a, b) {
      return a.every((row, r) => row.every((value, c) => value === b[r][c]));
    }

    function move(direction) {
      if (finished) return;

      const before = cloneBoard(board);
      const beforeIds = cloneIdBoard(tileIds);
      const beforeNextTileId = nextTileId;
      const previousPositions = getTilePositions();
      const beforeScore = score;
      let gained = 0;
      const mergePairs = [];
      spawnedCells = [];

      for (let i = 0; i < size; i += 1) {
        const result = slideAndMergeCells(getLineCells(direction, i));
        setLineCells(direction, i, result.line);
        gained += result.gained;
        mergePairs.push(...result.mergePairs);
      }

      if (boardsEqual(before, board)) return;

      const shouldSkipSpawn = skipSpawnOnce;
      previous = {
        board: before,
        tileIds: beforeIds,
        nextTileId: beforeNextTileId,
        score: beforeScore,
        won,
        finished,
        skipSpawnOnce
      };
      skipSpawnOnce = false;

      score += gained;
      if (score > best) {
        best = score;
        localStorage.setItem(bestKey, String(best));
      }

      if (!shouldSkipSpawn) {
        addRandomTile();
      }

      if (!won && board.some((row) => row.includes(2048))) {
        won = true;
        showToast("达成 2048，可以继续玩");
      }

      if (!canMove()) {
        showMessage("游戏结束", "没有可移动的格子了。", true);
      }

      const finalPositions = getTilePositions();
      const mergeGhosts = mergePairs.map(({ consumedId, survivorId, value }) => ({
        value,
        from: previousPositions.get(consumedId),
        to: finalPositions.get(survivorId)
      })).filter((ghost) => ghost.from && ghost.to);

      render(previousPositions, mergeGhosts);
      saveState();
    }

    function canMove() {
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          const value = board[r][c];
          if (!value) return true;
          if (board[r][c + 1] === value || board[r + 1]?.[c] === value) return true;
        }
      }
      return false;
    }

    function showMessage(title, copy, endGame) {
      finished = endGame;
      overlayOpen = true;
      messageTitleEl.textContent = title;
      messageCopyEl.textContent = copy;
      overlayAction.textContent = endGame ? "再来一局" : "继续";
      overlayEl.classList.add("show");
      saveState();
    }

    function showToast(copy) {
      toastEl.textContent = copy;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove("show");
      }, 1800);
    }

    function undo() {
      if (!previous) return;
      board = cloneBoard(previous.board);
      if (previous.tileIds) {
        tileIds = cloneIdBoard(previous.tileIds);
      } else {
        rebuildTileIds();
      }
      nextTileId = Number.isInteger(previous.nextTileId) ? previous.nextTileId : nextTileId;
      score = previous.score;
      won = previous.won;
      finished = previous.finished;
      overlayOpen = false;
      skipSpawnOnce = previous.skipSpawnOnce;
      spawnedCells = [];
      previous = null;
      render();
      saveState();
    }

    function armSkipSpawn() {
      if (finished) return;
      skipSpawnOnce = !skipSpawnOnce;
      render();
      saveState();
      showToast(skipSpawnOnce ? "下一步不刷新数字" : "已取消本步不刷");
    }

    function doubleTile(row, col) {
      const value = board[row]?.[col];
      if (finished || (value !== 2 && value !== 4)) return;

      previous = {
        board: cloneBoard(board),
        tileIds: cloneIdBoard(tileIds),
        nextTileId,
        score,
        won,
        finished,
        skipSpawnOnce
      };

      board[row][col] = value * 2;
      spawnedCells = [];
      render();
      saveState();
    }

    function getCellFromPoint(clientX, clientY) {
      const rect = tilesEl.getBoundingClientRect();
      const gap = Number.parseFloat(getComputedStyle(tilesEl).gap) || 0;
      const cellSize = (rect.width - gap * (size - 1)) / size;
      const x = clientX - rect.left;
      const y = clientY - rect.top;

      if (x < 0 || y < 0 || x > rect.width || y > rect.height) return null;

      const col = Math.floor(x / (cellSize + gap));
      const row = Math.floor(y / (cellSize + gap));
      const cellX = col * (cellSize + gap);
      const cellY = row * (cellSize + gap);

      if (col < 0 || col >= size || row < 0 || row >= size) return null;
      if (x > cellX + cellSize || y > cellY + cellSize) return null;

      return { row, col };
    }

    function continueAfterWin() {
      if (!finished) {
        overlayOpen = false;
        overlayEl.classList.remove("show");
      } else {
        setupGame();
      }
    }

    const keyMap = {
      ArrowLeft: "left",
      KeyA: "left",
      ArrowRight: "right",
      KeyD: "right",
      ArrowUp: "up",
      KeyW: "up",
      ArrowDown: "down",
      KeyS: "down"
    };

    window.addEventListener("keydown", (event) => {
      const direction = keyMap[event.code];
      if (!direction) return;
      event.preventDefault();
      move(direction);
    });

    window.addEventListener("resize", () => render());

    const doubleTapDelay = 340;
    let touchStart = null;
    let lastBoardTap = null;
    let lastTitleTap = 0;
    let lastTouchEnd = 0;

    document.addEventListener("touchend", (event) => {
      const now = Date.now();
      if (now - lastTouchEnd <= doubleTapDelay) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    function isSameCell(a, b) {
      return a && b && a.row === b.row && a.col === b.col;
    }

    function handleBoardTap(event) {
      const cell = getCellFromPoint(event.clientX, event.clientY);
      if (!cell) return;

      const now = Date.now();
      if (lastBoardTap
        && now - lastBoardTap.time < doubleTapDelay
        && isSameCell(cell, lastBoardTap.cell)) {
        event.preventDefault();
        lastBoardTap = null;
        doubleTile(cell.row, cell.col);
        return;
      }

      lastBoardTap = { cell, time: now };
    }

    function handleTitleTap(event) {
      const now = Date.now();
      if (now - lastTitleTap < doubleTapDelay) {
        event.preventDefault();
        lastTitleTap = 0;
        armSkipSpawn();
        return;
      }

      lastTitleTap = now;
    }

    function finishPointerInteraction(event, clientX, clientY) {
      if (!touchStart) return;
      const dx = clientX - touchStart.x;
      const dy = clientY - touchStart.y;
      touchStart = null;

      if (Math.max(Math.abs(dx), Math.abs(dy)) < 28) {
        handleBoardTap(event);
        return;
      }

      lastBoardTap = null;
      if (Math.abs(dx) > Math.abs(dy)) {
        move(dx > 0 ? "right" : "left");
      } else {
        move(dy > 0 ? "down" : "up");
      }
    }

    gameEl.addEventListener("pointerdown", (event) => {
      touchStart = { x: event.clientX, y: event.clientY };
      gameEl.setPointerCapture(event.pointerId);
    });

    gameEl.addEventListener("pointerup", (event) => {
      finishPointerInteraction(event, event.clientX, event.clientY);
    });

    gameEl.addEventListener("dblclick", (event) => {
      const cell = getCellFromPoint(event.clientX, event.clientY);
      if (!cell) return;
      doubleTile(cell.row, cell.col);
    });

    titleEl.addEventListener("dblclick", armSkipSpawn);
    titleEl.addEventListener("pointerup", handleTitleTap);

    if (!window.PointerEvent) {
      gameEl.addEventListener("touchstart", (event) => {
        const touch = event.changedTouches[0];
        touchStart = { x: touch.clientX, y: touch.clientY };
        event.preventDefault();
      }, { passive: false });

      gameEl.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        finishPointerInteraction(event, touch.clientX, touch.clientY);
        event.preventDefault();
      }, { passive: false });

      titleEl.addEventListener("touchend", (event) => {
        handleTitleTap(event);
      }, { passive: false });
    }

    undoButton.addEventListener("click", undo);
    newGameButton.addEventListener("click", setupGame);
    overlayAction.addEventListener("click", continueAfterWin);

    if (loadState()) {
      render();
    } else {
      setupGame();
    }
  </script>
</body>
</html>
